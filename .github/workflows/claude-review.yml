name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Only run if PR is opened OR comment contains @claude
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'issue_comment' && 
       contains(github.event.comment.body, '@claude') && 
       github.event.issue.pull_request)
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}..HEAD > pr_diff.txt
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          cat pr_diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install acpx
        run: npm install -g acpx

      - name: Run Claude Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Create a temporary review script
          cat > review.js << 'SCRIPT'
          const { execSync } = require('child_process');
          const fs = require('fs');
          
          const diff = fs.readFileSync('pr_diff.txt', 'utf8');
          
          // Truncate if too large
          const maxLength = 50000;
          const truncatedDiff = diff.length > maxLength 
            ? diff.substring(0, maxLength) + '\n\n[Diff truncated due to size...]' 
            : diff;
          
          const prompt = `Review this PR diff. Provide:
1. Summary of changes
2. Code quality issues (if any)
3. Security concerns (if any)
4. Architecture suggestions
5. Specific line-by-line comments for issues

Format line comments as:
FILE:path/to/file:LINE: COMMENT

PR Diff:
\`\`\`diff
${truncatedDiff}
\`\`\``;
          
          try {
            const result = execSync(`acpx claude exec "${prompt.replace(/"/g, '\\"')}"`, {
              encoding: 'utf8',
              timeout: 120000,
              maxBuffer: 10 * 1024 * 1024
            });
            console.log(result);
            fs.writeFileSync('review_output.txt', result);
          } catch (e) {
            console.error('Review failed:', e);
            process.exit(1);
          }
          SCRIPT
          
          node review.js

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewOutput = fs.readFileSync('review_output.txt', 'utf8');
            
            // Post main review comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude Code Review\n\n${reviewOutput}\n\n---\n*Reviewed by Claude Code*`
            });
            
            // Parse line-by-line comments (FILE:path:LINE: COMMENT format)
            const lineComments = [];
            const lines = reviewOutput.split('\n');
            for (const line of lines) {
              const match = line.match(/FILE:([^:]+):(\d+):\s*(.+)/);
              if (match) {
                lineComments.push({
                  path: match[1],
                  line: parseInt(match[2]),
                  body: match[3]
                });
              }
            }
            
            // Post line comments if any
            if (lineComments.length > 0) {
              const { data: pullRequest } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              
              const { data: commits } = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              
              const lastCommit = commits[commits.length - 1];
              
              for (const comment of lineComments.slice(0, 10)) { // Limit to 10 comments
                try {
                  await github.rest.pulls.createReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    commit_id: lastCommit.sha,
                    path: comment.path,
                    line: comment.line,
                    body: comment.body
                  });
                } catch (e) {
                  console.log(`Failed to post line comment: ${e.message}`);
                }
              }
            }

      - name: Trigger on @claude mention
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
